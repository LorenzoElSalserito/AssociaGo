name: Build AssociaGo Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot JAR
        run: ./gradlew build -x test

      # Preparazione risorse per Electron
      # Usiamo find per prendere solo il JAR corretto (escludendo -plain.jar) e copiarlo
      - name: Prepare Electron resources directory
        run: |
          mkdir -p desktop/resources/backend
          find build/libs -name "*.jar" ! -name "*-plain.jar" -exec cp {} desktop/resources/backend/backend.jar \;

      - name: Install Frontend Dependencies
        working-directory: ./desktop
        run: npm ci

      # Il comando npm run build:xxx esegue automaticamente 'prebuild' che scarica il JRE
      
      # --- LINUX ---
      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./desktop
        run: npm run build:linux

      # --- WINDOWS ---
      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        working-directory: ./desktop
        run: npm run build:win

      # --- MACOS ---
      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        working-directory: ./desktop
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AssociaGo-${{ matrix.os }}
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
          if-no-files-found: warn
          retention-days: 5
