name: Build Desktop

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot JAR
        run: ./gradlew bootJar -x test

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar
          if-no-files-found: error

  build-desktop:
    needs: build-backend
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs

      - name: Install Frontend Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./desktop
        run: npm ci

      - name: Install Frontend Dependencies (Windows/Mac)
        if: matrix.os != 'ubuntu-latest'
        working-directory: ./desktop
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./desktop
        run: npm run build:linux

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        working-directory: ./desktop
        run: npm run build:win

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        working-directory: ./desktop
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify packaging assets
        working-directory: ./desktop
        run: npm run verify:packaging

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AssociaGo-${{ matrix.os }}
          path: |
            desktop/dist-electron/*.AppImage
            desktop/dist-electron/*.deb
            desktop/dist-electron/*.exe
            desktop/dist-electron/*.dmg
            desktop/dist-electron/*.zip
          if-no-files-found: warn
          retention-days: 5

  source-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="AssociaGo-${VERSION}/" HEAD -o "AssociaGo-${VERSION}-source.zip"
          git archive --format=tar.gz --prefix="AssociaGo-${VERSION}/" HEAD -o "AssociaGo-${VERSION}-source.tar.gz"

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: |
            AssociaGo-*-source.zip
            AssociaGo-*-source.tar.gz
